services:
  db:
    image: postgres:16-alpine
    container_name: score_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      POSTGRES_DB: ${DB_NAME:-score_system}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Do NOT expose 5432 to host in production

  backend:
    build: ./backend
    container_name: score_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg2://${DB_USER:-postgres}:${DB_PASSWORD}@db:5432/${DB_NAME:-score_system}
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in .env}
      DEBUG: "false"
      CORS_ORIGINS: '["${FRONTEND_URL:-http://localhost}"]'
      WORKERS: ${WORKERS:-2}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: score_frontend
    restart: unless-stopped
    ports:
      - "${PORT:-80}:80"
    depends_on:
      - backend

volumes:
  postgres_data:
